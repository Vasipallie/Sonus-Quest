<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tauri App</title>
    <script type="module" src="/src/main.ts" defer></script>
    <style>
      form {
        display: flex;
        flex-direction: column;
        width: 100%;
      }
      input[type="text"] {
        margin-bottom: 10px;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 16px;
        font-family: 'geomanist', sans-serif;
      }
.file-upload-form {
  width: fit-content;
  height: fit-content;
  display: flex;
  align-items: center;
  justify-content: center;
}
.file-upload-label input {
  display: none;
}
.file-upload-label svg {
  height: 50px;
  fill: #F94B0F;
  margin-bottom: 20px;
}
.file-upload-label {
  cursor: pointer;
  padding: 30px 70px;
  border-radius: 40px;
  border: 2px dashed #F94B0F;
  box-shadow: 0px 0px 200px -50px rgba(0, 0, 0, 0.719);
}
.file-upload-design {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 5px;
}
.browse-button {
  background-color: #F94B0F;
  padding: 5px 15px;
  border-radius: 10px;
  color: white;
  transition: all 0.3s;
}
.browse-button:hover {
  background-color: #cc3300;
}

.submit-btn{
  background-color: #F94B0F;
  padding: 10px 20px;
  border-radius: 20px;
  color: white;
  font-size: 1.2em;
  font-family: 'geomanist', sans-serif;
  border: none;
  cursor: pointer;
  transition: all 0.3s;
  margin-top: 20px;

}
    </style>
  </head>

  <body>
    <main class="container">
      <a href="/index.html">
          <img src="/src/assets/arrow.svg"/>
      </a>
      <h1 class="h1">upload</h1>
      <p class="subtitle">Upload songs to your Sonus Quest</p>

      <form method="POST" action="/upload" >
        <label for="author" class="subtitle">Artist:</label>
        <input type="text" value="Unknown Artist" placeholder="Enter artist name" id="author" name="author" class="input">

        <label for="title" class="subtitle">Title:</label>
        <input type="text" value="Unknown Title" placeholder="Enter song title" id="title" name="title" class="input">

        <label for="file" class="file-upload-label">
    <div class="file-upload-design">
      <svg viewBox="0 0 640 512" height="1em">
        <path
          d="M144 480C64.5 480 0 415.5 0 336c0-62.8 40.2-116.2 96.2-135.9c-.1-2.7-.2-5.4-.2-8.1c0-88.4 71.6-160 160-160c59.3 0 111 32.2 138.7 80.2C409.9 102 428.3 96 448 96c53 0 96 43 96 96c0 12.2-2.3 23.8-6.4 34.6C596 238.4 640 290.1 640 352c0 70.7-57.3 128-128 128H144zm79-217c-9.4 9.4-9.4 24.6 0 33.9s24.6 9.4 33.9 0l39-39V392c0 13.3 10.7 24 24 24s24-10.7 24-24V257.9l39 39c9.4 9.4 24.6 9.4 33.9 0s9.4-24.6 0-33.9l-80-80c-9.4-9.4-24.6-9.4-33.9 0l-80 80z"
        ></path>
      </svg>
      <p>Drag and Drop</p>
      <p>or</p>
      <span class="browse-button">Browse file</span>
    </div>
    <input id="file" type="file" />
  </label>

  <button type="submit" class="submit-btn">Upload Song</button>

      </form>
      <div class="connect">
        <img src="/src/assets/connected.svg" class="imr" alt="Connect" />
        <div class="imrg">
          <p class="imrgh">Connected</p>
          <p class="imrgs">to <span id="device-name">Sonus Quest φ</span></p>
          <p class="imrgs a">mounted on <span id="mount-point">D:/</span></p>
        </div>
      </div>
    </main>
  </body>
</html>
